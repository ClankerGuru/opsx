name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build + test
        run: ./gradlew check

      - name: Coverage report
        if: always()
        run: ./gradlew :cli:koverLog :tui:koverLog

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            cli/build/reports/tests/
            cli/build/reports/kover/
            tui/build/reports/tests/
            tui/build/reports/kover/
          retention-days: 14
