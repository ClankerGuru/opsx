name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
          - os: ubuntu-latest
            platform: linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build + test
        run: ./gradlew check -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: Build distribution
        run: ./gradlew :app:installShadowDist -PVERSION_NAME=${{ steps.version.outputs.version }}

      - name: Package tarball
        run: |
          cd app/build/install/app-shadow
          tar czf /tmp/opsx-${{ matrix.platform }}.tar.gz bin lib

      - uses: actions/upload-artifact@v4
        with:
          name: opsx-${{ matrix.platform }}
          path: /tmp/opsx-${{ matrix.platform }}.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
